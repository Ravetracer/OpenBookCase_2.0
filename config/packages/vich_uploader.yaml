vich_uploader:
    db_driver: orm

    metadata:
        type: attribute

    mappings:
        images:
            uri_prefix: /images
            upload_destination: '%kernel.project_dir%/public/images'
            namer:
                service: Vich\UploaderBundle\Naming\PropertyNamer
                options: { property: 'uniqueFileName' }
            delete_on_remove: true
            delete_on_update: true
            inject_on_load: false
