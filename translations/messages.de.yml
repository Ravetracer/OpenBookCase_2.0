# ── Accessibility traffic-light labels ──
accessibility_level:
  none: 'Nicht barrierefrei'
  partial: 'Teilweise barrierefrei (mit Hilfe)'
  full: 'Voll barrierefrei'

cookies:
  title: "Cookies & Datenschutz"
  intro: "OpenBookCase speichert nur das Nötigste. Wir verwenden keine Werbe-Cookies und kein Tracking durch Dritte; die einzige Analyse ist unser eigenes, datenschutzfreundliches und cookieloses Matomo."
  essential_label: "Unbedingt erforderlich"
  essential_desc: "Ein Sitzungs-Cookie hält dich angemeldet und schützt Formulare vor CSRF. Ohne dieses Cookie funktioniert die Seite nicht."
  preferences_label: "Einstellungen"
  preferences_desc: "Deine Sprache (Cookie „obc_locale“) sowie deine Theme- und Sprachwahl (im lokalen Speicher deines Browsers). Wird nur gespeichert, wenn du sie änderst."
  maps_label: "Karte & Adresssuche"
  maps_desc: "Kartenkacheln kommen von OpenStreetMap, die Adresssuche nutzt Photon (komoot.io). Diese Dienste erhalten deine IP-Adresse, um die Karte anzuzeigen – sie setzen keine Cookies und tracken dich nicht."
  analytics_label: "Reichweitenmessung"
  analytics_desc: "Wir nutzen Matomo (selbst gehostet auf dieser Seite), um zu verstehen, wie die Seite genutzt wird. Es läuft ohne Cookies und mit gekürzter IP-Adresse, sodass du nicht persönlich identifiziert oder über andere Websites hinweg verfolgt wirst."
  no_tracking: "Keine Werbung. Keine Datenweitergabe. Kein Tracking durch Dritte."
  privacy_link: "Datenschutzerklärung lesen"
  accept: "Verstanden"

