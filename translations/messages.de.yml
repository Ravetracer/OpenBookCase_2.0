# ── Statische Seiten ──
static:
  help:
    title: "Anleitung"
  about:
    title: Über OpenBookCase
    lead: Was ist dieses Projekt?
    intro: 'OpenBookCase ist eine gemeinschaftsbasierte Plattform, um öffentliche Bücherschränke und Giveboxen in deiner Nähe zu finden und zu teilen. Jeder kann einen Bücherschrank auf der Karte entdecken, seinen Standort und seine Details ansehen und durch das Hinzufügen neuer Einträge beitragen.'
    how_title: So funktioniert es
    how_body: 'Durchstöbere die interaktive Karte, um Bücherschränke in deiner Umgebung zu finden. Klicke auf eine Markierung, um Details wie Öffnungszeiten, Adresse und Fotos zu sehen. Nutze die Listenansicht für einen schnellen Überblick über alle Einträge.'
    contributing_title: Mitmachen
    contributing_body: 'Erstelle ein kostenloses Konto, um neue Bücherschränke hinzuzufügen, Fotos hochzuladen, Standorte zu bewerten und deine Wunschliste der gesuchten Bücher zu verwalten.'
    contact_title: Kontakt
    contact_body: 'Fragen oder Feedback? Erreiche uns unter'
  imprint:
    title: Impressum
    lead: Rechtliche Angaben
    responsible_title: Verantwortlich für den Inhalt
    responsible_body: OpenBookCase-Projekt
    contact_title: Kontakt
    disclaimer_title: Haftungsausschluss
    disclaimer_body: 'Die Informationen auf dieser Website werden nach bestem Wissen bereitgestellt. Wir übernehmen keine Haftung für die Richtigkeit, Vollständigkeit oder Aktualität der Inhalte.'
  legal:
    title: Rechtliche Hinweise & Datenschutz
    lead: Nutzungsbedingungen und Datenschutz
    terms_title: Nutzungsbedingungen
    terms_body: 'Durch die Nutzung von OpenBookCase erklärst du dich bereit, Inhalte (Bücherschrank-Einträge, Fotos, Bewertungen) verantwortungsvoll und nur für ihren vorgesehenen Zweck beizutragen. Du darfst keine falschen Angaben oder Inhalte einreichen, die Rechte Dritter verletzen.'
    collect_title: Welche Daten wir erheben
    collect_intro: 'Bei der Registrierung erheben wir die folgenden personenbezogenen Daten:'
    collect_1: Benutzername und E-Mail-Adresse (für die Kontoverwaltung und E-Mail-Verifizierung)
    collect_2: Gehashtes Passwort (niemals im Klartext gespeichert)
    collect_public: 'Beiträge zur Karte (Standorte von Bücherschränken, Fotos) sind öffentlich sichtbar.'
    storage_title: Datenspeicherung
    storage_body: 'Deine Daten werden auf Servern innerhalb der Europäischen Union gespeichert. Wir verkaufen oder teilen deine personenbezogenen Daten nicht mit Dritten.'
    rights_title: Deine Rechte
    rights_body: 'Du hast jederzeit das Recht, auf deine personenbezogenen Daten zuzugreifen, sie zu korrigieren oder zu löschen. Kontaktiere uns unter'
    cookies_title: Cookies
    cookies_body: 'Diese Seite verwendet ein für die Anmeldung erforderliches Sitzungs-Cookie sowie ein Cookie, das deine gewählte Sprache speichert. Es werden keine Tracking- oder Analyse-Cookies verwendet.'
  licenses:
    title: Lizenzen
    lead: Wie OpenBookCase und seine Daten lizenziert sind
    intro: 'OpenBookCase ist ein offenes Projekt. Der Quellcode und die gesammelten Daten stehen unter getrennten offenen Lizenzen – wie schon beim Vorgängerprojekt.'
    code_title: Quellcode
    code_body: 'Der Quellcode von OpenBookCase ist Open Source und steht unter der'
    data_title: Datenbank
    data_body: 'Die gesammelten Daten zu Bücherschränken und Giveboxen werden als offene Datenbank unter der'

