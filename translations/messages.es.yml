    title: Aviso legal y política de privacidad
    lead: Condiciones de uso y protección de datos
    terms_title: Condiciones de uso
    terms_body: 'Al usar OpenBookCase aceptas contribuir con contenido (entradas de estanterías, fotos, valoraciones) de forma responsable y solo para su finalidad prevista. No debes enviar información falsa ni contenido que infrinja los derechos de terceros.'
    collect_title: Datos que recopilamos
    collect_intro: 'Recopilamos los siguientes datos personales cuando te registras:'
    collect_1: Nombre de usuario y dirección de correo (para la gestión de la cuenta y la verificación del correo)
    collect_2: Contraseña cifrada (nunca almacenada en texto plano)
    collect_public: 'Las contribuciones al mapa (ubicaciones de estanterías, fotos) son públicamente visibles.'
