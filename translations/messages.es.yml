    title: "Guía de uso"
  changelog:
    title: "Novedades"
    lead: Actualizaciones y mejoras recientes de OpenBookCase.
  about:
    title: Acerca de OpenBookCase
    lead: ¿Qué es este proyecto?
    intro: 'OpenBookCase es una plataforma impulsada por la comunidad para encontrar y compartir estanterías públicas y cajas de intercambio cerca de ti. Cualquiera puede descubrir una estantería en el mapa, ver su ubicación y detalles, y contribuir añadiendo nuevas entradas.'
    how_title: Cómo funciona
    how_body: 'Explora el mapa interactivo para encontrar estanterías en tu zona. Haz clic en cualquier marcador para ver detalles como el horario, la dirección y las fotos. Usa la vista de lista para tener una visión rápida de todas las entradas.'
    contributing_title: Contribuir
    contributing_body: 'Crea una cuenta gratuita para añadir nuevas estanterías, subir fotos, valorar ubicaciones y gestionar tu lista de deseos de libros que buscas.'
