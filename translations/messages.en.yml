# ── Static pages ──
static:
  help:
    title: "User guide"
  about:
    title: About OpenBookCase
    lead: What is this project?
    intro: 'OpenBookCase is a community-driven platform for finding and sharing public bookcases and give-boxes near you. Anyone can discover a bookcase on the map, view its location and details, and contribute by adding new entries.'
    how_title: How it works
    how_body: 'Browse the interactive map to find bookcases in your area. Click any marker to see details such as opening times, address, and photos. Use the list view for a quick overview of all entries.'
    contributing_title: Contributing
    contributing_body: 'Create a free account to add new bookcases, upload photos, rate locations, and manage your wishlist of books you are looking for.'
    contact_title: Contact
    contact_body: 'Questions or feedback? Reach us at'
  imprint:
    title: Imprint
    lead: Legal disclosure
    responsible_title: Responsible for content
    responsible_body: OpenBookCase Project
    contact_title: Contact
    disclaimer_title: Disclaimer
    disclaimer_body: 'The information on this website is provided in good faith. We accept no liability for the accuracy, completeness, or timeliness of the content.'
  legal:
    title: Legal Notice & Privacy Policy
    lead: Terms of use and data protection
    terms_title: Terms of Use
    terms_body: 'By using OpenBookCase you agree to contribute content (bookcase entries, photos, ratings) responsibly and only for its intended purpose. You must not submit false information or content that infringes third-party rights.'
    collect_title: Data We Collect
    collect_intro: 'We collect the following personal data when you register:'
    collect_1: Username and e-mail address (for account management and email verification)
    collect_2: Hashed password (never stored in plain text)
    collect_public: 'Map contributions (bookcase locations, photos) are publicly visible.'
    storage_title: Data Storage
    storage_body: 'Your data is stored on servers within the European Union. We do not sell or share your personal data with third parties.'
    rights_title: Your Rights
    rights_body: 'You have the right to access, correct, or delete your personal data at any time. Contact us at'
    cookies_title: Cookies
    cookies_body: 'This site uses a session cookie required for login functionality, and a cookie remembering your chosen language. No tracking or analytics cookies are used.'
  licenses:
    title: Licenses
    lead: How OpenBookCase and its data are licensed
    intro: 'OpenBookCase is an open project. Its source code and the collected data are made available under separate open licenses — as was already the case with its predecessor project.'
    code_title: Source code
    code_body: 'The OpenBookCase source code is open source, released under the'
    data_title: Database
    data_body: 'The collected bookcase and give-box data is published as an open database under the'

