# ── Accessibility traffic-light labels ──
accessibility_level:
  none: 'Not accessible'
  partial: 'Partly accessible (with help)'
  full: 'Fully accessible'

cookies:
  title: "Cookies & your privacy"
  intro: "OpenBookCase stores only what it needs to work. We use no advertising cookies and no third-party tracking; the only analytics is our own privacy-friendly, cookieless Matomo."
  essential_label: "Strictly necessary"
  essential_desc: "A session cookie keeps you signed in and protects forms against CSRF. The site can't work without it."
  preferences_label: "Preferences"
  preferences_desc: "Your language (the “obc_locale” cookie) plus your theme and language choice (saved in your browser's local storage). Stored only when you change them."
  maps_label: "Map & address search"
  maps_desc: "Map tiles come from OpenStreetMap and address search uses Photon (komoot.io). These services receive your IP address to deliver the map — they set no cookies and don't track you."
  analytics_label: "Reach measurement"
  analytics_desc: "We use Matomo (self-hosted on this site) to understand how the site is used. It runs without cookies and with a masked IP address, so you aren't personally identified or tracked across other websites."
  no_tracking: "No advertising. No data sold. No third-party tracking."
  privacy_link: "Read the privacy policy"
  accept: "Got it"

