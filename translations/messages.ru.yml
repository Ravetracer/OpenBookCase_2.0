cookies:
  title: "Cookie и конфиденциальность"
  intro: "OpenBookCase хранит только необходимое для работы. Мы не используем рекламные cookie и стороннее отслеживание; единственная аналитика — наш собственный, дружественный к приватности Matomo без cookie."
  essential_label: "Строго необходимые"
  essential_desc: "Сессионный cookie сохраняет вход и защищает формы от CSRF. Без него сайт не работает."
  preferences_label: "Настройки"
  preferences_desc: "Ваш язык (cookie «obc_locale») и выбор темы и языка (в локальном хранилище браузера). Сохраняется только при изменении."
  maps_label: "Карта и поиск адресов"
  maps_desc: "Плитки карты загружаются из OpenStreetMap, поиск адресов использует Photon (komoot.io). Эти сервисы получают ваш IP-адрес для отображения карты — они не устанавливают cookie и не отслеживают вас."
  analytics_label: "Измерение посещаемости"
  analytics_desc: "Мы используем Matomo (размещён на нашем сайте), чтобы понимать, как используется сайт. Он работает без cookie и с маскированным IP-адресом, поэтому вас нельзя идентифицировать лично или отслеживать на других сайтах."
  no_tracking: "Без рекламы. Без передачи данных. Без стороннего отслеживания."
  privacy_link: "Политика конфиденциальности"
  accept: "Понятно"

