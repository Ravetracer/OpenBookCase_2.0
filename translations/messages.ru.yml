# ── Статические страницы ──
static:
  help:
    title: "Руководство пользователя"
  changelog:
    title: "Что нового"
    lead: Последние обновления и улучшения OpenBookCase.
  about:
    title: О проекте OpenBookCase
    lead: Что это за проект?
    intro: 'OpenBookCase — это платформа на основе сообщества для поиска и обмена общедоступными книжными шкафами и боксами для обмена рядом с вами. Любой может найти шкаф на карте, посмотреть его расположение и сведения и внести вклад, добавляя новые записи.'
    how_title: Как это работает
    how_body: 'Просматривайте интерактивную карту, чтобы находить книжные шкафы поблизости. Нажмите на любую отметку, чтобы увидеть сведения, такие как часы работы, адрес и фотографии. Используйте список для быстрого обзора всех записей.'
    contributing_title: Участие
    contributing_body: 'Создайте бесплатный аккаунт, чтобы добавлять новые шкафы, загружать фотографии, оценивать места и управлять своим списком желаемых книг.'
    contact_title: Контакты
    contact_body: 'Вопросы или отзывы? Свяжитесь с нами по адресу'
  imprint:
    title: Выходные данные
    lead: Правовая информация
    responsible_title: Ответственный за содержание
    responsible_body: Проект OpenBookCase
    contact_title: Контакты
    disclaimer_title: Отказ от ответственности
    disclaimer_body: 'Информация на этом сайте предоставляется добросовестно. Мы не несём ответственности за точность, полноту или актуальность содержания.'
  legal:
    title: Правовая информация и политика конфиденциальности
    lead: Условия использования и защита данных
    terms_title: Условия использования
    terms_body: 'Используя OpenBookCase, вы соглашаетесь добавлять контент (записи о шкафах, фотографии, оценки) ответственно и только по назначению. Вы не должны предоставлять ложную информацию или контент, нарушающий права третьих лиц.'
    collect_title: Какие данные мы собираем
    collect_intro: 'При регистрации мы собираем следующие персональные данные:'
    collect_1: Имя пользователя и адрес эл. почты (для управления аккаунтом и подтверждения почты)
    collect_2: Хешированный пароль (никогда не хранится в открытом виде)
    collect_public: 'Вклады в карту (расположение шкафов, фотографии) общедоступны.'
    storage_title: Хранение данных
    storage_body: 'Ваши данные хранятся на серверах в пределах Европейского союза. Мы не продаём и не передаём ваши персональные данные третьим лицам.'
    rights_title: Ваши права
    rights_body: 'Вы имеете право в любое время получить доступ к своим персональным данным, исправить или удалить их. Свяжитесь с нами по адресу'
