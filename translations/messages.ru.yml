    cookies_body: 'Этот сайт использует сессионный файл cookie, необходимый для входа, и файл cookie, запоминающий выбранный вами язык. Файлы cookie для отслеживания или аналитики не используются.'
  licenses:
    title: Лицензии
    lead: Как лицензируются OpenBookCase и его данные
    intro: 'OpenBookCase — открытый проект. Его исходный код и собранные данные распространяются под отдельными открытыми лицензиями, как это уже было в проекте-предшественнике.'
