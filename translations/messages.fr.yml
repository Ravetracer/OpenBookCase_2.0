    data_attribution: 'Une partie des données de localisation provient de %osm% et reste © les contributeurs d''OpenStreetMap, utilisée sous la même Open Database License (ODbL).'
    taginfo: 'OpenBookCase publie également un %taginfo% décrivant les attributs OpenStreetMap utilisés.'
