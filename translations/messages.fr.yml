cookies:
  title: "Cookies et confidentialité"
  intro: "OpenBookCase ne stocke que le strict nécessaire pour fonctionner. Nous n'utilisons aucun cookie publicitaire ni pistage par des tiers ; la seule analyse est notre propre Matomo, respectueux de la vie privée et sans cookie."
  essential_label: "Strictement nécessaires"
  essential_desc: "Un cookie de session vous garde connecté et protège les formulaires contre le CSRF. Le site ne peut pas fonctionner sans lui."
  preferences_label: "Préférences"
  preferences_desc: "Votre langue (le cookie « obc_locale ») et votre choix de thème et de langue (enregistrés dans le stockage local de votre navigateur). Enregistrés uniquement lorsque vous les modifiez."
  maps_label: "Carte et recherche d'adresse"
  maps_desc: "Les tuiles de carte proviennent d'OpenStreetMap et la recherche d'adresse utilise Photon (komoot.io). Ces services reçoivent votre adresse IP pour afficher la carte ; ils ne déposent pas de cookies et ne vous suivent pas."
  analytics_label: "Mesure d'audience"
  analytics_desc: "Nous utilisons Matomo (hébergé sur ce site) pour comprendre comment le site est utilisé. Il fonctionne sans cookie et avec une adresse IP masquée ; vous n'êtes donc pas identifié personnellement ni suivi sur d'autres sites."
  no_tracking: "Aucune publicité. Aucune revente de données. Aucun pistage par des tiers."
  privacy_link: "Lire la politique de confidentialité"
  accept: "J'ai compris"

