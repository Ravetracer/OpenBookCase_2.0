# ── Pages statiques ──
static:
  help:
    title: "Guide d'utilisation"
  changelog:
    title: "Nouveautés"
    lead: Dernières mises à jour et améliorations d'OpenBookCase.
  about:
    title: À propos d'OpenBookCase
    lead: Qu'est-ce que ce projet ?
    intro: "OpenBookCase est une plateforme communautaire pour trouver et partager des boîtes à livres et des give-boxes publiques près de chez vous. Chacun peut découvrir une boîte à livres sur la carte, voir son emplacement et ses détails, et contribuer en ajoutant de nouvelles entrées."
    how_title: Comment ça marche
    how_body: "Parcourez la carte interactive pour trouver des boîtes à livres dans votre région. Cliquez sur un marqueur pour voir des détails comme les horaires, l'adresse et les photos. Utilisez la vue en liste pour un aperçu rapide de toutes les entrées."
    contributing_title: Contribuer
    contributing_body: "Créez un compte gratuit pour ajouter de nouvelles boîtes à livres, téléverser des photos, évaluer des emplacements et gérer votre liste de souhaits de livres recherchés."
    contact_title: Contact
    contact_body: 'Des questions ou des commentaires ? Contactez-nous à'
  imprint:
    title: Mentions légales
    lead: Informations légales
    responsible_title: Responsable du contenu
    responsible_body: Projet OpenBookCase
    contact_title: Contact
    disclaimer_title: Avertissement
    disclaimer_body: "Les informations de ce site sont fournies de bonne foi. Nous n'assumons aucune responsabilité quant à l'exactitude, l'exhaustivité ou l'actualité du contenu."
  legal:
    title: Mentions légales et politique de confidentialité
    lead: Conditions d'utilisation et protection des données
    terms_title: Conditions d'utilisation
    terms_body: "En utilisant OpenBookCase, vous acceptez de contribuer au contenu (entrées de boîtes à livres, photos, évaluations) de manière responsable et uniquement aux fins prévues. Vous ne devez pas soumettre de fausses informations ni de contenu portant atteinte aux droits de tiers."
    collect_title: Données que nous collectons
    collect_intro: 'Nous collectons les données personnelles suivantes lors de votre inscription :'
    collect_1: Nom d'utilisateur et adresse e-mail (pour la gestion du compte et la vérification de l'e-mail)
    collect_2: Mot de passe haché (jamais stocké en clair)
    collect_public: 'Les contributions à la carte (emplacements des boîtes à livres, photos) sont publiquement visibles.'
    storage_title: Stockage des données
    storage_body: "Vos données sont stockées sur des serveurs situés au sein de l'Union européenne. Nous ne vendons ni ne partageons vos données personnelles avec des tiers."
    rights_title: Vos droits
    rights_body: "Vous avez le droit d'accéder à vos données personnelles, de les corriger ou de les supprimer à tout moment. Contactez-nous à"
    cookies_title: Cookies
    cookies_body: "Ce site utilise un cookie de session nécessaire à la connexion et un cookie mémorisant la langue que vous avez choisie. Aucun cookie de suivi ou d'analyse n'est utilisé."
  licenses:
    title: Licences
    lead: Sous quelles licences sont publiés OpenBookCase et ses données
    intro: "OpenBookCase est un projet ouvert. Son code source et les données collectées sont publiés sous des licences ouvertes distinctes, comme c'était déjà le cas pour le projet précédent."
