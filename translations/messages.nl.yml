    data_body: 'De verzamelde gegevens over boekenkasten en give-boxen worden als open database gepubliceerd onder de'
    data_attribution: 'Een deel van de locatiegegevens is geïmporteerd uit %osm% en blijft © OpenStreetMap-bijdragers, gebruikt onder dezelfde Open Database License (ODbL).'

