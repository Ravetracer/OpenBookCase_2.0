# ── Statische pagina’s ──
static:
  help:
    title: "Handleiding"
  about:
    title: Over OpenBookCase
    lead: Wat is dit project?
    intro: 'OpenBookCase is een door de gemeenschap gedreven platform om openbare boekenkasten en weggeefkasten bij jou in de buurt te vinden en te delen. Iedereen kan een boekenkast op de kaart ontdekken, de locatie en details bekijken en bijdragen door nieuwe items toe te voegen.'
    how_title: Hoe het werkt
    how_body: 'Blader door de interactieve kaart om boekenkasten in jouw buurt te vinden. Klik op een markering om details te zien zoals openingstijden, adres en foto’s. Gebruik de lijstweergave voor een snel overzicht van alle items.'
    contributing_title: Bijdragen
    contributing_body: 'Maak een gratis account aan om nieuwe boekenkasten toe te voegen, foto’s te uploaden, locaties te beoordelen en je verlanglijst van gezochte boeken te beheren.'
    contact_title: Contact
    contact_body: 'Vragen of feedback? Bereik ons op'
  imprint:
    title: Colofon
    lead: Wettelijke informatie
    responsible_title: Verantwoordelijk voor de inhoud
    responsible_body: OpenBookCase-project
    contact_title: Contact
    disclaimer_title: Disclaimer
    disclaimer_body: 'De informatie op deze website wordt te goeder trouw verstrekt. Wij aanvaarden geen aansprakelijkheid voor de juistheid, volledigheid of actualiteit van de inhoud.'
  legal:
    title: Juridische kennisgeving & privacybeleid
    lead: Gebruiksvoorwaarden en gegevensbescherming
    terms_title: Gebruiksvoorwaarden
    terms_body: 'Door OpenBookCase te gebruiken, ga je ermee akkoord inhoud (boekenkastvermeldingen, foto’s, beoordelingen) verantwoordelijk en alleen voor het beoogde doel bij te dragen. Je mag geen valse informatie of inhoud indienen die rechten van derden schendt.'
    collect_title: Welke gegevens we verzamelen
    collect_intro: 'Bij registratie verzamelen we de volgende persoonlijke gegevens:'
    collect_1: Gebruikersnaam en e-mailadres (voor accountbeheer en e-mailverificatie)
    collect_2: Gehasht wachtwoord (nooit in platte tekst opgeslagen)
    collect_public: 'Bijdragen aan de kaart (locaties van boekenkasten, foto’s) zijn openbaar zichtbaar.'
    storage_title: Gegevensopslag
    storage_body: 'Je gegevens worden opgeslagen op servers binnen de Europese Unie. Wij verkopen of delen je persoonlijke gegevens niet met derden.'
    rights_title: Jouw rechten
    rights_body: 'Je hebt het recht om je persoonlijke gegevens op elk moment in te zien, te corrigeren of te verwijderen. Neem contact met ons op via'
    cookies_title: Cookies
    cookies_body: 'Deze site gebruikt een sessiecookie die nodig is voor het inloggen, en een cookie die je gekozen taal onthoudt. Er worden geen tracking- of analysecookies gebruikt.'
  licenses:
    title: Licenties
    lead: Hoe OpenBookCase en zijn gegevens zijn gelicentieerd
    intro: 'OpenBookCase is een open project. De broncode en de verzamelde gegevens worden onder afzonderlijke open licenties beschikbaar gesteld, zoals ook al bij het voorgangerproject het geval was.'
